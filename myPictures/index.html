<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web服务器 - 登录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            max-width: 90%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .toggle a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        
        .toggle a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录表单 -->
        <div id="loginForm">
            <h1>🔐 用户登录</h1>
            <div id="loginMessage" class="message"></div>
            <div class="form-group">
                <label for="loginUsername">用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <button onclick="handleLogin()">登录</button>
            <div class="toggle">
                还没有账号？<a onclick="showRegister()">立即注册</a>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="hidden">
            <h1>📝 用户注册</h1>
            <div id="registerMessage" class="message"></div>
            <div class="form-group">
                <label for="regUsername">用户名</label>
                <input type="text" id="regUsername" placeholder="3-20位字母数字下划线" required>
            </div>
            <div class="form-group">
                <label for="regPassword">密码</label>
                <input type="password" id="regPassword" placeholder="6-32位密码" required>
            </div>
            <div class="form-group">
                <label for="regPassword2">确认密码</label>
                <input type="password" id="regPassword2" placeholder="再次输入密码" required>
            </div>
            <button onclick="handleRegister()">注册</button>
            <div class="toggle">
                已有账号？<a onclick="showLogin()">立即登录</a>
            </div>
        </div>

        <!-- 登录成功后的欢迎页面 -->
        <div id="welcomePage" class="hidden">
            <h1>🎉 欢迎回来！</h1>
            <div class="form-group">
                <p>您已成功登录，用户：<span id="loggedInUser" style="color: #667eea; font-weight: bold;"></span></p>
                <p style="margin-top: 20px; color: #666; font-size: 14px;">
                    这是一个多Reactor高并发Web服务器演示<br>
                    支持：静态文件服务 + 用户登录注册
                </p>
            </div>
            <button onclick="logout()">退出登录</button>
            <div class="toggle">
                <a href="/">浏览文件目录</a>
            </div>
        </div>
    </div>

    <script>
        // 切换显示登录/注册表单
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('welcomePage').classList.add('hidden');
            clearMessages();
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('welcomePage').classList.add('hidden');
            clearMessages();
        }

        function showWelcome(username) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('welcomePage').classList.remove('hidden');
            document.getElementById('loggedInUser').textContent = username;
        }

        function clearMessages() {
            document.getElementById('loginMessage').className = 'message';
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('registerMessage').className = 'message';
            document.getElementById('registerMessage').style.display = 'none';
        }

        function showMessage(form, type, text) {
            const msgEl = document.getElementById(form + 'Message');
            msgEl.className = 'message ' + type;
            msgEl.textContent = text;
        }

        // 处理注册 - 兼容版
        function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;

            // 前端验证（保持不变）
            if (!username || !password) {
                showMessage('register', 'error', '用户名和密码不能为空');
                return;
            }
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                showMessage('register', 'error', '用户名格式错误：需3-20位字母数字下划线');
                return;
            }
            if (password.length < 6 || password.length > 32) {
                showMessage('register', 'error', '密码长度需6-32位');
                return;
            }
            if (password !== password2) {
                showMessage('register', 'error', '两次输入的密码不一致');
                return;
            }

            // 使用 XMLHttpRequest 替代 fetch（兼容性更好）
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/register', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    console.log('Register response:', xhr.status, xhr.responseText); // 调试日志
                    
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.success) {
                            showMessage('register', 'success', '注册成功！即将跳转到登录...');
                            setTimeout(() => {
                                showLogin();
                                document.getElementById('loginUsername').value = username;
                            }, 1500);
                        } else {
                            showMessage('register', 'error', data.message || '注册失败');
                        }
                    } catch (e) {
                        showMessage('register', 'error', '服务器返回格式错误: ' + xhr.responseText);
                    }
                }
            };
            
            xhr.onerror = function() {
                showMessage('register', 'error', '网络请求失败，请检查服务器是否运行');
            };
            
            const requestData = JSON.stringify({
                username: username,
                password: password
            });
            console.log('Sending register request:', requestData); // 调试日志
            xhr.send(requestData);
        }

        // 处理登录 - 兼容版
        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('login', 'error', '用户名和密码不能为空');
                return;
            }

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    console.log('Login response:', xhr.status, xhr.responseText); // 调试日志
                    
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.success) {
                            localStorage.setItem('currentUser', username);
                            showWelcome(username);
                        } else {
                            showMessage('login', 'error', data.message || '登录失败');
                        }
                    } catch (e) {
                        showMessage('login', 'error', '服务器返回格式错误: ' + xhr.responseText);
                    }
                }
            };
            
            xhr.onerror = function() {
                showMessage('login', 'error', '网络请求失败，请检查服务器是否运行');
            };
            
            const requestData = JSON.stringify({
                username: username,
                password: password
            });
            console.log('Sending login request:', requestData); // 调试日志
            xhr.send(requestData);
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            showLogin();
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // 页面加载时检查登录状态
        window.onload = function() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                showWelcome(savedUser);
            }
        };
    </script>
</body>
</html>
